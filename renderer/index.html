<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- セキュリティ: インラインスクリプト・外部リソースを制限 -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
  <title>HTMLSend</title>
  <!-- Google Fonts（オフライン時はフォールバックフォントを使用） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-wrapper">

    <!-- タイトルバー（macOSのhiddenInset用ドラッグ領域） -->
    <header class="app-header">
      <!-- アプリ名はabsoluteでウィンドウ中央に配置 -->
      <div class="app-title">
        <span class="app-title__name">HTMLSend</span>
      </div>
    </header>

    <!-- コンテンツエリア（1カラム・スクロールなし） -->
    <div class="app-body">
      <div class="content-area">

        <!-- 1. SMTP設定 -->
        <section class="section" id="section-smtp">
          <h2 class="section__title">SMTP設定</h2>
          <!-- メールアドレスとアプリパスワードを横並びにして縦スペースを節約 -->
          <div class="form-row form-row--inputs">
            <div class="form-group">
              <label class="form-label" for="input-email">メールアドレス</label>
              <input class="form-input" type="email" id="input-email" placeholder="example@gmail.com" autocomplete="off">
            </div>
            <div class="form-group">
              <label class="form-label" for="input-password">アプリパスワード</label>
              <input class="form-input" type="password" id="input-password" placeholder="xxxx xxxx xxxx xxxx" autocomplete="off">
            </div>
          </div>
          <div class="form-row">
            <button class="btn btn--primary" id="btn-smtp-save">設定を保存</button>
            <button class="btn btn--ghost" id="btn-smtp-clear">削除</button>
          </div>
          <p class="form-status" id="smtp-status"></p>
        </section>

        <hr class="divider">

        <!-- 2. HTMLファイル -->
        <section class="section" id="section-file">
          <!-- セクションタイトルとファイル名を同じ行に横並び。未読み込み時はfile-nameを非表示 -->
          <div class="section-header">
            <h2 class="section__title">HTMLファイル</h2>
            <p class="file-name file-name--hidden" id="file-name"></p>
          </div>
          <!-- D&DゾーンとブラウザボタンをFlexで横並び、ボタンは下揃え -->
          <div class="file-row">
            <div class="drop-zone" id="drop-zone">
              <p class="drop-zone__text">ここにドロップ</p>
              <p class="drop-zone__sub">または</p>
              <button class="btn btn--outline" id="btn-file-select">ファイルを選択</button>
            </div>
            <button class="btn btn--accent btn--preview" id="btn-preview" disabled>ブラウザで確認する</button>
          </div>
        </section>

        <hr class="divider">

        <!-- 3. HTMLを直接ペースト -->
        <section class="section" id="section-paste">
          <h2 class="section__title">HTMLを直接ペースト</h2>
          <div class="form-group">
            <textarea class="form-textarea form-textarea--code" id="input-html-paste" placeholder="HTMLコードをここに貼り付け"></textarea>
          </div>
        </section>

        <hr class="divider">

        <!-- 4. 送信 -->
        <section class="section" id="section-send">
          <h2 class="section__title">送信</h2>
          <div class="form-row form-row--inputs">
            <div class="form-group">
              <label class="form-label" for="input-subject">件名</label>
              <input class="form-input" type="text" id="input-subject" placeholder="メールの件名">
            </div>
            <div class="form-group">
              <label class="form-label" for="input-recipients">宛先（1行1アドレス）</label>
              <textarea class="form-textarea form-textarea--recipients" id="input-recipients" placeholder="to@example.com&#10;another@example.com"></textarea>
            </div>
          </div>
          <button class="btn btn--accent btn--full" id="btn-send">送信する</button>
        </section>

        <!-- 送信結果ログ -->
        <section class="section section--log" id="section-log">
          <div class="log" id="send-log"></div>
        </section>

      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
